# Conda environment file for Heart Disease Risk Prediction using MLP
# Description: Environment for machine learning model training and data analysis
# Python: 3.10
name: masterML

channels:
  - defaults
  - conda-forge

dependencies:
  # Core Python and build tools
  - python=3.10.*
  - pip>=25.0
  - setuptools>=80.0
  - wheel>=0.45.0

  # System libraries
  - blas=1.0
  - bzip2=1.0.8
  - ca-certificates
  - expat=2.7.3
  - libffi=3.4.4
  - libzlib=1.3.1
  - ncurses=6.5
  - openssl>=3.0.0
  - readline=8.3
  - sqlite=3.50.2
  - tk=8.6.15
  - xz=5.6.4
  - zlib=1.3.1

  # Numerical and scientific computing
  - libopenblas=0.3.30
  - libgfortran=5.0.0
  - libgfortran5=11.3.0
  - llvm-openmp=20.1.8
  - numpy>=2.2.0
  - scipy>=1.15.0

  # Python packages via pip
  - pip:
    # Data processing
    - pandas>=2.3.0
    - python-dateutil>=2.9.0

    # Machine learning
    - scikit-learn>=1.7.0
    - joblib>=1.5.0
    - threadpoolctl>=3.6.0

    # Visualization
    - matplotlib>=3.10.0
    - contourpy>=1.3.0
    - cycler>=0.12.0
    - kiwisolver>=1.4.0
    - pillow>=12.0.0
    - fonttools>=4.60.0
    - pyparsing>=3.2.0

    # Utilities
    - packaging>=25.0
    - pytz>=2025.0
    - tzdata>=2025.0
    - six>=1.17.0
    - debugpy>=1.8.0  # For debugging support
